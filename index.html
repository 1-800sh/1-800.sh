<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>1-800</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Courier New", monospace;
    user-select: none;
    cursor: crosshair;
  }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #enterText {
    font-size: 14px;
    letter-spacing: 4px;
    background: none;
    border: 1px solid #fff;
    border-radius: 4px;
    color: #fff;
    padding: 12px 30px;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.2s;
  }

  #enterText:hover {
    background: #111;
  }
</style>
</head>

<body>

<audio id="bgMusic" src="background.mp3" loop></audio>

<button id="enterText">WE LIKE KIDS</button>

<script>
const btn = document.getElementById("enterText");
const music = document.getElementById("bgMusic");

btn.addEventListener("click", () => {
  music.volume = 0.5;
  music.play().catch(() => {});

  // change text permanently
  btn.textContent = "placeholder";

  // disable further clicks
  btn.style.pointerEvents = "none";
});
</script>

</body>
</html>
